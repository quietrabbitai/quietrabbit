# Quiet Rabbit — Tauri CI
# Status: STUB — manual trigger only. Configure and expand before first release build.
# Traces to: D6-339 (Rust migration), item 16d-setup
#
# When activating for release:
#   1. Add TAURI_SIGNING_PRIVATE_KEY + TAURI_SIGNING_PRIVATE_KEY_PASSWORD to GitHub secrets
#   2. Set correct node version and frontend build command
#   3. Expand 'on:' to include push/pull_request on main
#   4. Verify target triples: windows, macOS x86, macOS arm64, Linux

name: Tauri CI

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libsqlcipher-dev \
            build-essential curl wget file libssl-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev

      - name: Format check
        working-directory: src-tauri
        run: cargo fmt --check

      - name: Clippy
        working-directory: src-tauri
        run: cargo clippy -- -D warnings

      - name: Test
        working-directory: src-tauri
        run: cargo test

